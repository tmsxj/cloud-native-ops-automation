---
- name: 全节点预配置
  hosts: all
  become: true
  tasks:
    - name: 更新系统软件包
      apt:
        update_cache: yes
        upgrade: dist

    - name: 安装依赖包
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - vim
          - tree
          - htop
          - net-tools
          - iproute2
          - sysstat
          - lsof
          - tcpdump
        state: present

    - name: 关闭 ufw 防火墙
      ufw:
        state: disabled

    - name: 配置内核参数
      copy:
        content: |
          net.bridge.bridge-nf-call-ip6tables = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.ipv4.ip_forward = 1
          vm.swappiness = 0
        dest: /etc/sysctl.d/99-k8s.conf
      register: sysctl_config

    - name: 应用内核参数
      command: sysctl --system
      when: sysctl_config.changed

    - name: 禁用 swap
      command: swapoff -a

    - name: 永久禁用 swap
      replace:
        path: /etc/fstab
        regexp: '^([^#].*swap.*)$'
        replace: '#\1'

    - name: 设置时区为 Asia/Shanghai
      timezone:
        name: Asia/Shanghai

    - name: 安装 containerd.io
      apt:
        name: containerd.io
        state: present

    - name: 创建 containerd 配置目录
      file:
        path: /etc/containerd
        state: directory

    - name: 生成 containerd 默认配置
      command: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: 配置主机名
      hostname:
        name: "{{ inventory_hostname }}"

    - name: 添加 hosts 条目
      lineinfile:
        path: /etc/hosts
        line: "{{ hostvars[item].ansible_host }} {{ item }}"
      loop: "{{ groups['all'] }}"