# ============================================================
# 华为云AOM告警规则配置集
# 适用于：卡儿酷科技 华为云CCE集群
# 说明：以下YAML为华为云AOM告警规则模板，需在华为云Console中创建
#       也可通过华为云CLI/API批量导入
# ============================================================

# ============================================================
# 一、告警策略（AlarmPolicy）— 定义通知方式和接收人
# ============================================================

# 告警策略1：P0紧急告警 — 5分钟重复通知，@所有人
# 华为云Console路径：AOM → 告警管理 → 告警策略 → 新建告警策略
#
# 策略名称: carku-p0-critical
# 通知频率: 5分钟
# 通知方式: 企业微信机器人
# 接收人: 运维组（@all）
#
# 企业微信机器人配置：
# 1. 在企业微信群中添加机器人，获取Webhook URL
# 2. 华为云Console → AOM → 告警管理 → 告警行动规则 → 新建
# 3. 行动类型：企业微信机器人
# 4. Webhook地址: https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=<your-key>
# 5. 消息模板:
#    告警名称: {{alarm_name}}
#    告警级别: {{severity}}
#    告警时间: {{time}}
#    告警内容: {{content}}
#    主机: {{metadata.host}}
#    命名空间: {{metadata.namespace}}
#    实例: {{metadata.instance}}

# 告警策略2：P1重要告警 — 30分钟重复通知
# 策略名称: carku-p1-warning
# 通知频率: 30分钟
# 通知方式: 企业微信机器人
# 接收人: 运维组

# 告警策略3：P2一般告警 — 4小时重复通知
# 策略名称: carku-p2-info
# 通知频率: 4小时
# 通知方式: 企业微信机器人
# 接收人: 运维组


# ============================================================
# 二、CCE集群告警规则（AOM内置 + 自定义）
# ============================================================

# --- 2.1 节点级别告警 ---

# 规则1: 节点CPU使用率过高
# 规则名称: node-cpu-high
# 告警级别: warning
# 查询语句(PromQL):
#   100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
# 持续时间: 5分钟
# 告警策略: carku-p1-warning
#
# 华为云Console路径: AOM → 告警管理 → 告警规则 → 新建告警规则
# 规则类型: Prometheus
# Prometheus实例: 选择CCE集群关联的Prometheus实例

# 规则2: 节点内存使用率过高
# 规则名称: node-memory-high
# 告警级别: warning
# 查询语句:
#   (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
# 持续时间: 5分钟
# 告警策略: carku-p1-warning

# 规则3: 节点磁盘使用率过高
# 规则名称: node-disk-high
# 告警级别: critical
# 查询语句:
#   (1 - node_filesystem_avail_bytes{fstype=~"ext4|xfs"} / node_filesystem_size_bytes{fstype=~"ext4|xfs"}) * 100 > 90
# 持续时间: 5分钟
# 告警策略: carku-p0-critical

# 规则4: 节点NotReady
# 规则名称: node-not-ready
# 告警级别: critical
# 查询语句:
#   kube_node_status_condition{condition="Ready",status="true"} == 0
# 持续时间: 2分钟
# 告警策略: carku-p0-critical


# --- 2.2 Pod级别告警 ---

# 规则5: Pod重启次数过多
# 规则名称: pod-restart-too-many
# 告警级别: warning
# 查询语句:
#   increase(kube_pod_container_status_restarts_total[1h]) > 5
# 持续时间: 10分钟
# 告警策略: carku-p1-warning

# 规则6: Pod CrashLoopBackOff
# 规则名称: pod-crashloop
# 告警级别: critical
# 查询语句:
#   kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} > 0
# 持续时间: 5分钟
# 告警策略: carku-p0-critical

# 规则7: Pod OOMKilled
# 规则名称: pod-oomkilled
# 告警级别: critical
# 查询语句:
#   kube_pod_container_status_terminated_reason{reason="OOMKilled"} > 0
# 持续时间: 1分钟
# 告警策略: carku-p0-critical

# 规则8: Pod Pending（超过5分钟）
# 规则名称: pod-pending
# 告警级别: warning
# 查询语句:
#   kube_pod_status_phase{phase="Pending"} > 0
# 持续时间: 5分钟
# 告警策略: carku-p1-warning

# 规则9: Deployment副本数不满足
# 规则名称: deployment-replicas-mismatch
# 告警级别: warning
# 查询语句:
#   kube_deployment_spec_replicas != kube_deployment_status_available_replicas
# 持续时间: 10分钟
# 告警策略: carku-p1-warning


# --- 2.3 中间件告警 ---

# 规则10: MySQL连接数使用率过高
# 规则名称: mysql-connections-high
# 告警级别: warning
# 查询语句:
#   mysql_global_status_threads_connected / mysql_global_variables_max_connections * 100 > 80
# 持续时间: 5分钟
# 告警策略: carku-p1-warning

# 规则11: MySQL慢查询过多
# 规则名称: mysql-slow-queries
# 告警级别: warning
# 查询语句:
#   rate(mysql_global_status_slow_queries[5m]) > 1
# 持续时间: 10分钟
# 告警策略: carku-p1-warning

# 规则12: Redis内存使用率过高
# 规则名称: redis-memory-high
# 告警级别: warning
# 查询语句:
#   redis_memory_used_bytes / redis_memory_max_bytes * 100 > 85
# 持续时间: 5分钟
# 告警策略: carku-p1-warning

# 规则13: Redis连接数过多
# 规则名称: redis-connections-high
# 告警级别: warning
# 查询语句:
#   redis_connected_clients > 500
# 持续时间: 5分钟
# 告警策略: carku-p1-warning


# --- 2.4 电池业务专属告警 ---

# 规则14: EMQX(MQTT Broker)连接数异常
# 规则名称: emqx-connections-abnormal
# 告警级别: critical
# 查询语句:
#   emqx_connections_count < 10
# 持续时间: 5分钟
# 说明: 正常情况下应有大量BMS设备连接，连接数骤降说明Broker故障或网络中断
# 告警策略: carku-p0-critical

# 规则15: EMQX消息积压
# 规则名称: emqx-message-backlog
# 告警级别: warning
# 查询语句:
#   emqx_messages_queued > 10000
# 持续时间: 10分钟
# 说明: 消息队列积压说明消费端处理不过来
# 告警策略: carku-p1-warning

# 规则16: BMS设备批量离线
# 规则名称: bms-device-offline
# 告警级别: critical
# 查询语句:
#   # 通过EMQX离线设备数或TDengine写入中断判断
#   increase(tdengine_incoming_points[5m]) == 0
# 持续时间: 10分钟
# 说明: TDengine无新数据写入，说明BMS设备全部离线或数据管道中断
# 告警策略: carku-p0-critical

# 规则17: 电池温度异常
# 规则名称: battery-temperature-abnormal
# 告警级别: critical
# 查询语句:
#   # 通过业务指标或TDengine查询
#   avg(battery_temperature) > 60
# 持续时间: 5分钟
# 说明: 电池温度超过60度，存在安全隐患
# 告警策略: carku-p0-critical
# 特殊处理: 此告警需要@all + 电话通知负责人

# 规则18: TDengine写入延迟
# 规则名称: tdengine-write-latency
# 告警级别: warning
# 查询语句:
#   tdengine_write_latency_seconds > 1
# 持续时间: 10分钟
# 说明: TDengine写入延迟超过1秒，可能磁盘IO瓶颈
# 告警策略: carku-p1-warning

# 规则19: 公网服务错误率过高
# 规则名称: web-service-error-rate
# 告警级别: critical
# 查询语句:
#   sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
#   / sum(rate(http_requests_total[5m])) by (service) > 0.05
# 持续时间: 5分钟
# 说明: 5xx错误率超过5%
# 告警策略: carku-p0-critical

# 规则20: ELB后端健康检查失败
# 规则名称: elb-health-check-fail
# 告警级别: critical
# 查询语句:
#   # 华为云ELB健康检查指标
#   elb_health_check_fail_count > 0
# 持续时间: 2分钟
# 说明: ELB后端服务器健康检查失败，服务不可用
# 告警策略: carku-p0-critical


# ============================================================
# 三、华为云SMN（消息通知）配置
# ============================================================

# 如果企业微信机器人不够用（如需要短信、电话通知），配置SMN：
#
# 1. 华为云Console → 消息通知服务SMN → 创建主题
#    主题名称: carku-ops-alert
#    
# 2. 添加订阅：
#    - 企业微信: 添加企业机器人订阅
#    - 邮件: 运维邮箱
#    - 短信: 运维手机号（仅P0告警）
#
# 3. AOM告警策略关联SMN主题：
#    AOM → 告警管理 → 告警行动规则 → 新建
#    行动类型: SMN通知
#    主题: carku-ops-alert
#
# 4. P0告警升级（电话通知）：
#    SMN → 消息模板 → 创建模板
#    模板内容包含告警详情
#    关联短信/语音通知


# ============================================================
# 四、告警静默与抑制规则
# ============================================================

# 静默规则1: 维护窗口静默
# 场景: 计划内发布/维护时，避免误告警
# 配置: AOM → 告警管理 → 告警静默 → 新建静默规则
# 时间: 按维护窗口设置（如每周三22:00-23:00）
# 匹配: 所有告警 或 指定命名空间的告警

# 抑制规则1: 节点故障抑制Pod告警
# 场景: 节点NotReady时，该节点上的Pod告警无意义
# 配置: 当 node-not-ready 触发时，抑制该节点上的 pod-crashloop、pod-pending 告警

# 抑制规则2: 高级别抑制低级别
# 场景: P0告警触发后，不需要再发P2告警
# 配置: 同一资源的告警，critical级别抑制warning和info


# ============================================================
# 五、告警规则快速创建脚本（华为云API）
# ============================================================

#!/bin/bash
# aom-create-alert-rules.sh
# 功能: 通过华为云API批量创建AOM告警规则
# 前置: 需要华为云AK/SK，已安装hcloud CLI

# 华为云AOM API创建告警规则示例
# hcloud AOM CreateAlarmRule \
#   --region cn-south-1 \
#   --name "node-cpu-high" \
#   --type "prometheus" \
#   --prometheus {
#     "promql": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100) > 85",
#     "duration": 300,
#     "severity": "warning"
#   }

# 注意: 华为云AOM API的具体参数格式请参考官方文档
# https://support.huaweicloud.com/api-aom/aom_02_0001.html
